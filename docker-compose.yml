version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flash_postgres
    environment:
      POSTGRES_USER: flash_user
      POSTGRES_PASSWORD: flash_pass
      POSTGRES_DB: flash_sale
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: